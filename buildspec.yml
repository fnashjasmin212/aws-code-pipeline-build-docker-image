version: 0.2

phases:
  pre_build:
    commands:
      - export MARTINI_VERSION=$(aws ssm get-parameter --name "$BUILD_IMAGE_PARAMETER" --query "Parameter.Value" --output text 2>/dev/null || echo "")

      - "missing=0; for var in BUILD_IMAGE_PARAMETER ECR_REPO_URI; do if [ -z \"${!var}\" ] || [ \"${!var}\" = \"null\" ]; then echo \"ERROR: $var is missing or empty\"; missing=1; fi; done; if [ \"$missing\" = \"1\" ]; then exit 1; fi"

      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin "$ECR_REPO_URI"


  build:
    commands:
      - echo "Building Docker image for Martini version ${MARTINI_VERSION}..."
      - docker build -f docker/Dockerfile --build-arg MARTINI_VERSION="$MARTINI_VERSION" -t mr:"$MARTINI_VERSION" .
      - echo "Tagging image..."
      - docker tag mr:"$MARTINI_VERSION" "$ECR_REPO_URI:$MARTINI_VERSION"

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push "$ECR_REPO_URI:$MARTINI_VERSION"
      - echo Writing image definitions file...
      - printf '[{"name":"martini-runtime-docker","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - '**/*'
    - imagedefinitions.json
  discard-paths: true
